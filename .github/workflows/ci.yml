name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

  build:
    name: Dist up to date
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Fail if dist is stale
        run: |
          if ! git diff --quiet dist/ || [ -n "$(git ls-files --others --exclude-standard dist/)" ]; then
            echo "dist/ is out of date."
            echo "Trusted branch pushes will be auto-fixed by the dist sync workflow."
            echo "Forks still need to run 'npm run build' and commit the result locally."
            git diff --stat dist/
            git ls-files --others --exclude-standard dist/
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint:all
