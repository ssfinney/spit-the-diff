name: Dist Sync

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  sync-dist:
    name: Rebuild dist when stale
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Detect stale dist
        id: dist
        run: |
          if ! git diff --quiet dist/ || [ -n "$(git ls-files --others --exclude-standard dist/)" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit rebuilt dist
        if: steps.dist.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "Auto-build dist [skip ci]"
          git push
