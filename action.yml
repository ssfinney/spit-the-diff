name: 'spit-the-diff'
description: 'Where your diffs drop bars. Generates creative rap, haiku, or roast summaries of pull requests using AI.'
author: 'ssfinney'

branding:
  icon: 'mic'
  color: 'purple'

inputs:
  format:
    description: 'Output format: rap, haiku, or roast. The roast label also triggers roast mode automatically.'
    required: false
    default: 'rap'

  model:
    description: 'OpenAI model to use for generation'
    required: false
    default: 'gpt-4.1-mini'

  max_files:
    description: 'Maximum number of changed files to include in the diff sent to the LLM'
    required: false
    default: '6'

  roast_label:
    description: 'PR label that enables roast mode'
    required: false
    default: 'roast-me'

  enable_moderation:
    description: 'Run OpenAI moderation on generated output before posting. Set to false to disable.'
    required: false
    default: 'true'

  skip_drafts:
    description: 'Skip draft PRs when set to true.'
    required: false
    default: 'false'

  min_diff_lines:
    description: 'Skip if total non-noise diff lines are below this threshold (0 or empty = disabled).'
    required: false
    default: '0'

  mic_drop_threshold:
    description: 'Use a 2-line "mic drop" when non-noise diff lines are below this threshold (0 or empty = disabled).'
    required: false
    default: '0'

  openai_api_key:
    description: 'OpenAI API key for LLM calls'
    required: true

  github_token:
    description: 'GitHub token used to post PR comments'
    required: false
    default: ${{ github.token }}

outputs:
  content:
    description: 'The generated creative summary text'

runs:
  using: 'node20'
  main: 'dist/index.js'
