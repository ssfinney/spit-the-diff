name: 'spit-the-diff'
description: 'Where your diffs drop bars. Generates creative rap, haiku, or roast summaries of pull requests using AI.'
author: 'ssfinney'

branding:
  icon: 'mic'
  color: 'purple'

inputs:
  format:
    description: 'Output format: rap or haiku. Roast mode is enabled only when the roast label is present.'
    required: false
    default: 'rap'

  model:
    description: 'OpenAI model to use for generation'
    required: false
    default: 'gpt-4o-mini'

  roast_label:
    description: 'PR label that enables roast mode'
    required: false
    default: 'roast-me'

  openai_api_key:
    description: 'OpenAI API key for LLM calls'
    required: true

  github_token:
    description: 'GitHub token used to post PR comments'
    required: false
    default: ${{ github.token }}

runs:
  using: 'node20'
  main: 'dist/index.js'
