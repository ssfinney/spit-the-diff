name: 'spit-the-diff'
description: 'Where your diffs drop bars. Generates creative rap, haiku, or roast summaries of pull requests using AI.'
author: 'ssfinney'

branding:
  icon: 'mic'
  color: 'purple'

inputs:
  format:
    description: 'Output format: rap, haiku, or roast. The roast label also triggers roast mode automatically.'
    required: false
    default: 'rap'

  model:
    description: 'OpenAI model to use for generation'
    required: false
    default: 'gpt-4o-mini'

  max_files:
    description: 'Maximum number of changed files to include in the diff sent to the LLM'
    required: false
    default: '6'

  roast_label:
    description: 'PR label that enables roast mode'
    required: false
    default: 'roast-me'

  openai_api_key:
    description: 'OpenAI API key for LLM calls'
    required: true

  github_token:
    description: 'GitHub token used to post PR comments'
    required: false
    default: ${{ github.token }}

  profanity_filter:
    description: 'Profanity filter mode: off or on (uses PurgoMalum API when on)'
    required: false
    default: 'on'

  profanity_api_base_url:
    description: 'Base URL for profanity API provider (PurgoMalum-compatible)'
    required: false
    default: 'https://www.purgomalum.com'

outputs:
  content:
    description: 'The generated creative summary text'

runs:
  using: 'node20'
  main: 'dist/index.js'
